<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Providence V2 — Demo checkout</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 520px; margin: 0 auto; padding: 80px 24px 40px;
      color: #1a1a1a; background: #fafaf7;
    }
    #controls {
      position: fixed; top: 0; left: 0; right: 0;
      background: #111; color: #fff;
      padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: ui-monospace, monospace; font-size: 13px;
      z-index: 999;
    }
    #controls button {
      background: #fff; color: #111; border: 0;
      padding: 6px 14px; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 12px;
    }
    #event-count { font-variant-numeric: tabular-nums; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px 0; }
    p.lede { color: #666; margin: 0 0 32px 0; font-size: 14px; }
    .form-row { margin: 16px 0; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 12px;
      border: 1px solid #ccc; border-radius: 6px;
      font-family: inherit; font-size: 14px;
    }
    .actions { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }
    button.app {
      padding: 12px 16px; border-radius: 6px; border: 0;
      font-family: inherit; font-size: 14px; cursor: pointer;
      text-align: left;
    }
    .primary { background: #0f766e; color: #fff; }
    .secondary { background: #f0f0f0; color: #111; }
    /* Looks clickable but has no handler */
    .dead-link {
      display: inline-block; color: #0f766e; cursor: pointer;
      text-decoration: underline; margin-top: 16px; font-size: 13px;
      user-select: none;
    }
    .hint {
      font-family: ui-monospace, monospace; font-size: 11px;
      color: #999; margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="controls" class="rr-block">
    <span>Recording · <span id="event-count">0</span> events</span>
    <button id="stop-btn">Stop &amp; Send</button>
  </div>

  <h1>Checkout</h1>
  <p class="lede">Demo page. Every button below produces a different signal. Click a few, then press <b>Stop &amp; Send</b>.</p>

  <div class="form-row">
    <label>Email</label>
    <input type="email" value="test@example.com">
  </div>
  <div class="form-row">
    <label>Card number</label>
    <input type="text" value="4242 4242 4242 4242">
  </div>

  <div class="actions">
    <button class="app primary" onclick="throw new Error('Cannot read properties of undefined (reading \\'checkout\\')')">
      Pay now <span class="hint">→ JS error</span>
    </button>

    <button class="app primary" onclick="Promise.reject(new Error('Network timeout on /api/charge'))">
      Retry payment <span class="hint">→ unhandled promise rejection</span>
    </button>

    <button class="app secondary" onclick="fetch('/demo/500')">
      Apply promo code <span class="hint">→ failed 5xx request</span>
    </button>

    <button class="app secondary" onclick="void 0">
      Save for later <span class="hint">→ handler exists but does nothing (rage target)</span>
    </button>

    <span class="dead-link">
      Forgot your password? <span class="hint">→ styled link, no click handler (dead click)</span>
    </span>
  </div>

  <script type="module" src="/agent.js"></script>
</body>
</html>
